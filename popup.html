<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Timbers Matchday Notifier</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Timbers Matchday</h1> 
  </header>

  <section class="match-info section">
    <h2>Next Match</h2>
    <div id="match-info">
      Loading match data...
    </div>
    <div id="countdown" class="countdown"></div>
    <a id="full-schedule" href="https://www.mlssoccer.com/schedule/portland-timbers-matches" target="_blank" rel="noopener">View Full Schedule</a>
  </section>

  <section class="fan-engagement section">
    <h2>Fan Engagement</h2>
    <div id="fan-engagement-area">
      <p>How confident are you in the Timbers win?</p>
      <button data-vote="high">High Confidence</button>
      <button data-vote="medium">Medium Confidence</button>
      <button data-vote="low">Low Confidence</button>
      <p id="vote-result"></p>
    </div>
  </section>

  <script src="popup.js"></script>
</body>
</html>
